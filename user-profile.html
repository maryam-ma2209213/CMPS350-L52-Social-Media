<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script src="https://kit.fontawesome.com/05b76dde2a.js" crossorigin="anonymous"></script>
</head>
</head>

<body>
    <main>
        <div class="profile-info-div">
            <div class="profile-pic-div">
                <img class="userPfpImage" src="/media/profile-pic.jpg" alt="image of the profile picture" id="profile-picture" width="100" height="100">
                <input type="file" id="selectedPfp" accept="image/*" style="display: none;">
            </div>
            <div class="username-div">
                <h3 id="username-h3">Username</h3>
            </div>
            <div class="about-you-div">
                <p id="about-you">About user </p>
            </div>
            <div class="posts-followers-following">
                <p>28 posts</p>
                <p>28 followers</p>
                <p>28 following</p>
            </div>
        </div>
        <a href="edit-profile.html" id="edit-prof-link">Edit Profile</a>
        <div class="user-posts-div">
            <div class="post">
                <img src="/media/post1.jpg" width="200" alt="post number 1">
            </div>
            <div class="post">
                <img src="/media/post2.jpg" width="200" alt="post number 2">
            </div>
            <div class="post">
                <img src="/media/post3.jpg" width="200" alt="post number 3">
            </div>
            <div class="post">
                <img src="/media/post4.jpg" width="200" alt="post number 4">
            </div>
            <div class="post">
                <img src="/media/post5.jpg" width="200" alt="post number 5">
            </div>
            <div class="post">
                <img src="/media/post6.jpg" width="200" alt="post number 6">
            </div>
            <div class="post">
                <video controls width="200" src="/media/post7.mp4"></video>
            </div>
            <div class="post">
                <img src="/media/post8.jpg" width="200" alt="post number 8">
            </div>
        </div>
    </main>
    <aside class="side">
        <ul class="page-links">
            <li><a href="feed.html"><i class="fa-solid fa-newspaper"></i></a></li>
            <li><a href="user-profile.html"><i class="fa-solid fa-user"></i></a></li>
            <li><a href="create-post.html"><i class="fa-solid fa-note-sticky"></i></a></li>
        </ul>
    </aside>
    <script src="js/profile.js"></script>
</body>

</html>
