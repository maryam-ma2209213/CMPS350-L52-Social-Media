<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script src="https://kit.fontawesome.com/05b76dde2a.js" crossorigin="anonymous"></script>
</head>
</head>

<body>
    <main>
        <div class="profile-info-div">
            <div class="profile-pic-div">
                <img src="/media/profile-pic.jpg" alt="image of the profile picture" id="profile-picture" width="100"
                    height="100">
            </div>
            <div class="username-div">
                <h3 id="username-h3">Username</h3>
            </div>
            <div class="about-you-div">
                <p id="about-you">About user </p>
            </div>
            <div class="posts-followers-following">
                <p>28 posts</p>
                <p>28 followers</p>
                <p>28 following</p>
            </div>
        </div>
        <button type="button" class="follow-btn">Follow</button>
        <div class="user-posts-div">
            <div class="post">
                <img src="/media/post1.jpg" width="200" alt="post number 1">
                <div class="post-overlay">
                    <span class="overlay-stat"><span>🤍</span> 24</span>
                    <span class="overlay-stat"><span>💬</span> 5</span>
                </div>
            </div>
            <div class="post">
                <img src="/media/post2.jpg" width="200" alt="post number 2">
                <div class="post-overlay">
                    <span class="overlay-stat"><span>🤍</span> 11</span>
                    <span class="overlay-stat"><span>💬</span> 2</span>
                </div>
            </div>
            <div class="post">
                <img src="/media/post3.jpg" width="200" alt="post number 3">
                <div class="post-overlay">
                    <span class="overlay-stat"><span>🤍</span> 38</span>
                    <span class="overlay-stat"><span>💬</span> 9</span>
                </div>
            </div>
            <div class="post">
                <img src="/media/post4.jpg" width="200" alt="post number 4">
                <div class="post-overlay">
                    <span class="overlay-stat"><span>🤍</span> 7</span>
                    <span class="overlay-stat"><span>💬</span> 1</span>
                </div>
            </div>
            <div class="post">
                <img src="/media/post5.jpg" width="200" alt="post number 5">
                <div class="post-overlay">
                    <span class="overlay-stat"><span>🤍</span> 52</span>
                    <span class="overlay-stat"><span>💬</span> 14</span>
                </div>
            </div>
            <div class="post">
                <img src="/media/post6.jpg" width="200" alt="post number 6">
                <div class="post-overlay">
                    <span class="overlay-stat"><span>🤍</span> 19</span>
                    <span class="overlay-stat"><span>💬</span> 3</span>
                </div>
            </div>
            <div class="post">
                <video controls width="200" src="/media/post7.mp4"></video>
                <div class="post-overlay">
                    <span class="overlay-stat"><span>🤍</span> 6</span>
                    <span class="overlay-stat"><span>💬</span> 0</span>
                </div>
            </div>
            <div class="post">
                <img src="/media/post8.jpg" width="200" alt="post number 8">
                <div class="post-overlay">
                    <span class="overlay-stat"><span>🤍</span> 33</span>
                    <span class="overlay-stat"><span>💬</span> 7</span>
                </div>
            </div>
        </div>
    </main>
    <aside class="side">
        <ul class="page-links">
            <li><a href="feed.html"><i class="fa-solid fa-newspaper"></i></a></li>
            <li><a href="profile.html"><i class="fa-solid fa-user"></i></a></li>
            <li><a href="create-post.html"><i class="fa-solid fa-note-sticky"></i></a></li>
        </ul>
    </aside>
</body>

</html>
