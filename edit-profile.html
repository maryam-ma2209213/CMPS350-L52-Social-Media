<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <h2 id="edit-prof-h2">Edit Profile</h2>
    <form action="" method="POST" class="edit-profile-form">
        <fieldset class="edit-profile-class">
            <label for="profile-pic">Update your profile picture </label>
            <input type="file" name="profile-pic" id="profile-pic" accept="image/*">
            <label for="username">Username</label>
            <input type="text" name="username" id="username">
            <label for="about-you">About you</label>
            <textarea name="about-you" id="about-you"></textarea>
            <label for="gender">Gender</label>
            <select name="gender" id="gender">
                <option value="" disabled selected hidden>-- Select --</option>
                <option value="female">Female</option>
                <option value="male">Male</option>
                <option value="prefer-not">Prefer not to say</option>
            </select>
        </fieldset>
        <button type="submit" class="submit-btn">Submit</button>
    </form>

</body>

</html>
