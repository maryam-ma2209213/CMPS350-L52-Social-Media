<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Playwrite+NZ+Basic:wght@100..400&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body class="edit-profile-body">
    <header>
        <h2 id="edit-prof-h2">Edit Profile</h2>
    </header>
    <section class="edit-profile-section">
        <form action="" method="POST" class="edit-profile-form">
            <fieldset class="edit-profile-fieldset">
                <div class="pfp-edit-div">
                    <label for="profile-pic">Update your profile picture </label>
                    <input type="file" name="profile-pic" id="profile-pic" accept="image/*">
                </div>
                <div class="username-edit-div">
                    <label for="username">Username</label>
                    <input type="text" name="username" id="username" placeholder="current_username">
                </div>
                <div class="aboutyou-edit-div">
                    <label for="aboutyou-edit">About you</label>
                    <textarea name="aboutyou-edit" id="aboutyou-edit"></textarea>
                </div>
                <div class="gender-div">
                    <label for="gender">Gender</label>
                    <select name="gender" id="gender">
                        <option value="" disabled selected hidden>-- Select Gender --</option>
                        <option value="female">Female</option>
                        <option value="male">Male</option>
                        <option value="prefer-not">Prefer not to say</option>
                    </select>
                </div>

            </fieldset>
            <button type="submit" class="submit-btn">Submit</button>
        </form>
    </section>

    <script src="js/edit-profile.js"></script>
</body>

</html>
