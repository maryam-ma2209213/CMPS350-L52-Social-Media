<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a Post</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <section class="auth-section">
            <div class="banner-content">
                <h1 class="platform-name">Social Media</h1>
                <p class="platform-slogan">Connect with Friends</p>
            </div>
    </section>
    <header class="cpost-header">
        <h2>Create a New Post to Share with Your Friends</h2>
    </header>
    <div class="memory">
        <div class="sides">
        <div class="mem-pic">
            <img src="/media/polaroid.png" alt="polaroid frame" id="attachTrigger">
            <p>Attach your memories</p>
            <input type="file" id="pictureUpload" accept="image/*" style="display:none;">
        </div>
        <div class="mem-line">
            <img src="/media/blackpen.png" alt="feather pen" id="writeTrigger">
            <p>Write a memorable line</p>
            <input type="text" name="caption" id="caption" placeholder="Write your caption..." style="display: none;">
        </div>
        </div>
        <article class="feed-card">
                    <div class="post-top">
                        <div class="user">
                        <img src="media/emptypfp.jpg" alt="user profile pictrue">
                        <h6 class="post-owner">Username</h6>
                        </div>
                        <h6 class="following">Following</h6>
                    </div>
                    <div class="post-content">
                    <img src="media/emptypfp.jpg" alt="post content picture" id="postPicture">
                    </div>
                <p id="postCaption"></p>
        </article>
    </div>
    <div class="buttons">
    <button id="submit" type="submit" value="create">Create Post</button>
    <button id="reset" type="reset" value="discard">Discard Changes</button>
    </div>



    <script src="js/create-post.js"></script>
</body>
</html>
