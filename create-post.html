<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a Post</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <section class="auth-section">
            <div class="banner-content">
                <h1 class="platform-name">Social Media</h1>
                <p class="platform-slogan">Connect with Friends</p>
            </div>
    </section>
    <header class="cpost-header">
        <h2>Create a New Post to Share with Your Friends</h2>
    </header>
    <div class="memory">
        <div class="sides">
        <div class="mem-pic">
            <img src="Image.png" alt="polaroid frame">
            <p>Attach your memories</p>
        </div>
        <div class="mem-line">
            <img src="pen.png" alt="feather pen">
            <p>Write a memorable line</p>
        </div>
        </div>
        <article class="feed-card">
                    <div class="post-top">
                        <div class="user">
                        <img src="pfp.jpg" alt="user profile pictrue">
                        <h6 class="post-owner">Username</h6>
                        </div>
                        <h6 class="following">Following</h6>
                    </div>
                    <div class="post-content">
                    <img src="pfp.jpg" alt="post content picture">
                    </div>
                <p>this is where the picture caption can be written</p>
        </article>
    </div>



    
</body>
</html>
